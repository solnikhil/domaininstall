name: Publish npm package

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm-production
    steps:
      - name: Check out exact tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.3
        with:
          fetch-depth: 0
      - name: Set up Node.js for npm trusted publishing
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Require tag to equal package version
        run: node --input-type=module --eval 'const p=(await import("./package.json",{with:{type:"json"}})).default; if(process.env.GITHUB_REF_NAME!==`v${p.version}`){throw new Error(`expected tag v${p.version}`)}'
      - run: npm ci
      - run: npm test
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run verify:package
      - name: Publish with npm trusted publishing
        run: npm publish --access public --provenance
